<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangas|Xc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto p-6">
        <header class="flex justify-between items-center py-10 border-b border-gray-800 mb-10">
            <div>
                <h1 class="text-4xl font-black tracking-tighter uppercase text-cyan-500">:D<span class="text-white">Mangas Xc</span></h1>
                <p class="text-gray-500 italic">Bienvenidos a MangasXc, subo animes gore y te doy la oportunidad de subir tus mangas FUERTES gore tambien.</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <!-- Sección de Subida -->
            <aside class="space-y-6">
                <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                    <h2 class="text-xl font-bold mb-2">Subir Documento</h2>
                    <div class="mb-4 p-3 bg-cyan-950/30 border border-cyan-800 rounded-lg">
                        <p class="text-xs text-cyan-400 font-mono uppercase tracking-widest mb-1">Servidor: Supabase Storage</p>
                        <p class="text-sm text-gray-300">Estado: <span class="text-white font-bold text-lg">Activo</span></p>
                        <p class="text-[10px] text-gray-500 mt-1 italic">* Los PDFs se guardan directamente sin procesar.</p>
                    </div>

                    <div class="space-y-4">
                        <input type="text" id="pdfTitle" placeholder="Título del PDF..." 
                               class="w-full bg-gray-800 border-none rounded-lg p-3 outline-none focus:ring-2 focus:ring-cyan-500 text-white">
                        <input type="file" id="pdfFile" accept=".pdf" 
                               class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-cyan-600 file:text-white hover:file:bg-cyan-500 cursor-pointer">
                        <button onclick="subirTodo()" id="btnAccion" class="w-full bg-white text-black font-black py-3 rounded-lg hover:bg-cyan-400 transition uppercase tracking-widest">
                            Publicar
                        </button>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-2 space-y-8" id="pdfFeed">
                <p class="text-gray-600">Conectando con Supabase...</p>
            </main>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const SUPABASE_URL = 'https://bfdmzcchoablcmgafeuf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vAeSmujzwqN75FCzE-Oc4Q_cq5jLLe8'; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function subirTodo() {
            const fileInput = document.getElementById('pdfFile');
            const file = fileInput.files[0];
            const titulo = document.getElementById('pdfTitle').value;
            const btn = document.getElementById('btnAccion');

            if (!file || !titulo) return alert("Por favor, llena todos los campos.");

            btn.innerText = "Subiendo archivo...";
            btn.disabled = true;

            try {
                // 1. Generar nombre de archivo único para evitar choques
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;

                // 2. Subir al Bucket 'mangas' (referencia a image_80a8fc.png)
                const { data: uploadData, error: uploadError } = await supabaseClient
                    .storage
                    .from('mangas')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // 3. Obtener URL pública
                const { data: { publicUrl } } = supabaseClient
                    .storage
                    .from('mangas')
                    .getPublicUrl(fileName);

                // 4. Registrar en la tabla 'archivos'
                const { error: dbError } = await supabaseClient
                    .from('archivos')
                    .insert([{ 
                        nombre: titulo, 
                        url: publicUrl,
                        uuid: 'b63e15c5-f9cd-4509-ae0f-f2c031cf6ccf' 
                    }]);

                if (dbError) throw dbError;

                alert("¡Manga publicado con éxito en Supabase!");
                location.reload();

            } catch (err) {
                alert("Error: " + err.message);
                console.error(err);
            } finally {
                btn.innerText = "Publicar";
                btn.disabled = false;
            }
        }

        async function cargarLista() {
            const feed = document.getElementById('pdfFeed');
            const { data: archivos, error } = await supabaseClient
                .from('archivos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            if (archivos.length === 0) {
                feed.innerHTML = '<p class="text-gray-600">No hay mangas subidos aún.</p>';
                return;
            }

            feed.innerHTML = archivos.map(pdf => {
                return `
                    <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800 shadow-2xl transition hover:border-cyan-500 group">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-2xl font-bold text-white group-hover:text-cyan-400 transition">${pdf.nombre}</h3>
                                <p class="text-gray-500 text-xs font-mono mt-1 uppercase tracking-tighter">ID: ${pdf.id}</p>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="eliminarManga(${pdf.id})" class="text-gray-600 hover:text-red-500 transition p-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                                
                                <a href="${pdf.url}" 
                                   download="${pdf.nombre.replace(/\s+/g, '_')}.pdf" 
                                   target="_blank" 
                                   class="bg-white text-black p-3 rounded-full hover:bg-cyan-500 transition shadow-lg">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function eliminarManga(id) {
            const password = prompt("Ingresa la contraseña de administrador:");
            if (password !== "2005") return alert("Acceso denegado.");

            if (!confirm("¿Eliminar este manga?")) return;

            const { error } = await supabaseClient
                .from('archivos')
                .delete()
                .eq('id', id);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Eliminado.");
                location.reload();
            }
        }

        cargarLista();
    </script>
</body>
</html>
