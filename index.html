<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Nexus | Jhoshy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto p-6">
        <header class="flex justify-between items-center py-10 border-b border-gray-800 mb-10">
            <div>
                <h1 class="text-4xl font-black tracking-tighter uppercase text-cyan-500">:D<span class="text-white">MangasXc</span></h1>
                <p class="text-gray-500 italic">Bienvenidos a MangasXc.</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <aside class="space-y-6">
                <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                    <h2 class="text-xl font-bold mb-4">Subir Documento</h2>
                    <div class="space-y-4">
                        <input type="text" id="pdfTitle" placeholder="Título del PDF..." 
                               class="w-full bg-gray-800 border-none rounded-lg p-3 outline-none focus:ring-2 focus:ring-cyan-500">
                        <input type="file" id="pdfFile" accept=".pdf" 
                               class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-cyan-600 file:text-white hover:file:bg-cyan-500 cursor-pointer">
                        <button onclick="subirTodo()" id="btnAccion" class="w-full bg-white text-black font-black py-3 rounded-lg hover:bg-cyan-400 transition uppercase tracking-widest">
                            Publicar
                        </button>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-2 space-y-8" id="pdfFeed">
                <p class="text-gray-600">Cargando base de datos...</p>
            </main>
        </div>
    </div>

    <script>
        const CLOUD_NAME = 'dm57fnquw'; 
        const UPLOAD_PRESET = 'preset_jhoshy'; // Revisa que este nombre sea igual en Cloudinary
        const SUPABASE_URL = 'https://bfdmzcchoablcmgafeuf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vAeSmujzwqN75FCzE-Oc4Q_cq5jLLe8'; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function subirTodo() {
            const file = document.getElementById('pdfFile').files[0];
            const titulo = document.getElementById('pdfTitle').value;
            const btn = document.getElementById('btnAccion');

            if (!file || !titulo) return alert("Por favor, llena todos los campos.");

            btn.innerText = "Subiendo...";
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);

                const resCloud = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const dataCloud = await resCloud.json();

                if (!dataCloud.secure_url) throw new Error("Error en Cloudinary");

                const { error } = await supabaseClient
                    .from('archivos')
                    .insert([{ 
                        nombre: titulo, 
                        url: dataCloud.secure_url, 
                        uuid: 'b63e15c5-f9cd-4509-ae0f-f2c031cf6ccf' 
                    }]);

                if (error) throw error;

                alert("¡Documento sincronizado!");
                location.reload();

            } catch (err) {
                alert("Error: Revisa que el preset en Cloudinary sea 'No firmado'.");
                console.error(err);
            } finally {
                btn.innerText = "Publicar";
                btn.disabled = false;
            }
        }

        async function cargarLista() {
            const feed = document.getElementById('pdfFeed');
            const { data: archivos, error } = await supabaseClient
                .from('archivos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            feed.innerHTML = archivos.map(pdf => `
                <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800 shadow-2xl transition hover:border-cyan-500 group">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-2xl font-bold text-white group-hover:text-cyan-400 transition">${pdf.nombre}</h3>
                            <p class="text-gray-500 text-xs font-mono mt-1 uppercase tracking-tighter">${pdf.uuid}</p>
                        </div>
                        <a href="${pdf.url.replace('/upload/', '/upload/fl_attachment/')}" target="_blank" class="bg-white text-black p-3 rounded-full hover:bg-cyan-500 transition shadow-lg">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        cargarLista();
    </script>
</body>
</html>
